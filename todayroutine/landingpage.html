<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>루틴플래너 - 오늘습관</title>
    <meta
      name="description"
      content="루틴플래너 - 오늘습관 다운로드 페이지"
    />
    <style>
      :root {
        --bg: #f4f7fb;
        --card: rgba(255, 255, 255, 0.9);
        --text: #122033;
        --muted: #5f6f83;
        --primary: #2b6de0;
        --primary-soft: #e8f0ff;
        --success: #1f8f5f;
        --border: rgba(18, 32, 51, 0.08);
        --shadow: 0 18px 48px rgba(39, 61, 89, 0.14);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family:
          "SF Pro Display",
          "Apple SD Gothic Neo",
          "Noto Sans KR",
          "Segoe UI",
          sans-serif;
        color: var(--text);
        background:
          radial-gradient(circle at top left, #ffffff 0%, transparent 28%),
          linear-gradient(160deg, #eef4ff 0%, #f8fbff 42%, #f4f7fb 100%);
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
      }

      .card {
        width: min(100%, 720px);
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 28px;
        box-shadow: var(--shadow);
        padding: 28px;
        backdrop-filter: blur(18px);
      }

      .hero {
        display: flex;
        gap: 20px;
        align-items: center;
      }

      .icon {
        width: 88px;
        height: 88px;
        border-radius: 24px;
        background: linear-gradient(160deg, #e8efff 0%, #eef8f1 100%);
        display: grid;
        place-items: center;
        overflow: hidden;
        flex: 0 0 auto;
      }

      .icon img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      .eyebrow {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 6px 10px;
        border-radius: 999px;
        background: #eef8f1;
        color: var(--success);
        font-size: 13px;
        font-weight: 700;
      }

      h1 {
        margin: 10px 0 8px;
        font-size: clamp(28px, 5vw, 40px);
        line-height: 1.08;
        letter-spacing: -0.03em;
      }

      p {
        margin: 0;
        color: var(--muted);
        line-height: 1.6;
        font-size: 16px;
      }

      .actions {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 12px;
        margin-top: 28px;
      }

      .button {
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 56px;
        border-radius: 18px;
        text-decoration: none;
        font-weight: 800;
        font-size: 16px;
        transition:
          transform 0.18s ease,
          box-shadow 0.18s ease,
          background-color 0.18s ease;
      }

      .button:hover {
        transform: translateY(-1px);
      }

      .button.primary {
        background: var(--primary);
        color: white;
        box-shadow: 0 12px 24px rgba(43, 109, 224, 0.26);
      }

      .button.secondary {
        background: var(--primary-soft);
        color: var(--primary);
      }

      .footer {
        margin-top: 22px;
        padding-top: 18px;
        border-top: 1px solid var(--border);
        color: var(--muted);
        font-size: 14px;
      }

      .footer code {
        font-family:
          "SFMono-Regular",
          "Menlo",
          "Consolas",
          monospace;
        background: rgba(18, 32, 51, 0.05);
        border-radius: 8px;
        padding: 2px 6px;
      }

      @media (max-width: 640px) {
        .card {
          padding: 22px;
          border-radius: 22px;
        }

        .hero {
          flex-direction: column;
          align-items: flex-start;
        }

        .actions {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main class="card">
      <section class="hero">
        <div class="icon">
          <img
            src="./splash_icon.png"
            alt="루틴플래너 아이콘"
          />
        </div>
        <div>
          <div class="eyebrow">Today Habits</div>
          <h1>루틴플래너 - 오늘습관</h1>
          <p>
            오늘 해야 할 루틴을 빠르게 확인하고, 기록과 통계로 꾸준함을
            이어가세요.
          </p>
        </div>
      </section>

      <section class="actions">
        <a
          class="button primary"
          id="ios-link"
          href="https://apps.apple.com/kr/app/%EB%A3%A8%ED%8B%B4%ED%94%8C%EB%9E%98%EB%84%88-%EC%98%A4%EB%8A%98%EC%8A%B5%EA%B4%80/id6759849216"
        >
          App Store에서 다운로드
        </a>
        <a
          class="button secondary"
          id="android-link"
          href="https://play.google.com/store/apps/details?id=com.jaewoong.moonworks.routineplanner"
        >
          Google Play에서 다운로드
        </a>
      </section>
    </main>

    <script>
      const IOS_URL =
        "https://apps.apple.com/kr/app/%EB%A3%A8%ED%8B%B4%ED%94%8C%EB%9E%98%EB%84%88-%EC%98%A4%EB%8A%98%EC%8A%B5%EA%B4%80/id6759849216";
      const ANDROID_URL =
        "https://play.google.com/store/apps/details?id=com.jaewoong.moonworks.routineplanner";

      const hasRealIosLink = !IOS_URL.includes("YOUR_APPLE_APP_ID");
      const ua = navigator.userAgent || navigator.vendor || window.opera;
      const isAndroid = /android/i.test(ua);
      const isAppleDevice = /iPad|iPhone|iPod/.test(ua);

      if (isAndroid) {
        window.location.replace(ANDROID_URL);
      } else if (isAppleDevice && hasRealIosLink) {
        window.location.replace(IOS_URL);
      }
    </script>
  </body>
</html>
